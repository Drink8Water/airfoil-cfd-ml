# Smoke experiment: SimpleCNN + MSE field loss, 1 epoch.
# Verifies the full framework pipeline end-to-end.
#
# Usage:
#   python scripts/train.py --config configs/experiment/smoke_simple_cnn.yaml

data:
  train_dir: "../train2"
  val_dir: "../test"
  batch_size: 4
  num_workers: 0

model:
  name: "simple_cnn"
  kwargs:
    in_channels: 3
    hidden_channels: 16
    n_layers: 3
    out_channels: 3

loss:
  name: "field"
  kwargs:
    reduction: "mse"
    channel_weights: [1.0, 1.0, 1.0]

train:
  epochs: 1
  lr: 0.001
  weight_decay: 0.0
  save_dir: "outputs/smoke_simple_cnn"
